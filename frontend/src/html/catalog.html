<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Каталог</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/catalog.css">
</head>
<body>

<header>
    <a class="logo" href="main.html">Trava</a>
    <nav>
        <ul>
            <li><a href="main.html">Главная</a></li>
            <li><a href="catalog.html">Каталог</a></li>
            <li data-auth="out"><a href="login.html">Вход</a></li>
            <li data-auth="out"><a href="register.html">Регистрация</a></li>
            <li data-auth="in"><a href="profile.html">Профиль</a></li>
            <li data-auth="in"><a href="#" data-logout>Выйти</a></li>
        </ul>
    </nav>
</header>

<main class="catalog">

    <h1 class="title">Поиск мест и маршрутов</h1>

    <section class="filters" aria-label="Фильтры поиска">
        <div class="filters-grid">
            <div class="filter">
                <label for="q">Поиск</label>
                <input id="q" type="text" placeholder="Например: музей, паста, парк">
            </div>

            <div class="filter">
                <label for="country">Страна</label>
                <select id="country">
                    <option value="">Любая</option>
                </select>
            </div>

            <div class="filter">
                <label for="city">Город</label>
                <select id="city" disabled>
                    <option value="">Любой</option>
                </select>
            </div>

            <div class="filter">
                <label for="type">Тип</label>
                <select id="type">
                    <option value="">Любой</option>
                    <option value="attraction">Достопримечательность</option>
                    <option value="restaurant">Ресторан</option>
                    <option value="hotel">Отель</option>
                </select>
            </div>

            <div class="filter">
                <label for="rating">Рейтинг от</label>
                <select id="rating">
                    <option value="">Любой</option>
                    <option value="4.8">4.8+</option>
                    <option value="4.5">4.5+</option>
                    <option value="4.0">4.0+</option>
                    <option value="3.5">3.5+</option>
                </select>
            </div>

            <div class="filter actions">
                <button id="reset" type="button" class="btn-inline">Сбросить</button>
            </div>
        </div>
        <div class="muted-hint">
            Сейчас данные берутся из локального списка (фронтенд). Позже можно подключить источник вроде Google Maps API.
        </div>
    </section>

    <div id="results" class="cards"></div>

</main>

<script src="../js/session.js" defer></script>
<script src="../js/places-provider.js" defer></script>
<script src="../js/catalog-search.js" defer></script>
</body>
</html>
