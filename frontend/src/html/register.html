<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
<header>
    <a class="logo" href="main.html">Trava</a>
    <nav>
        <ul>
            <li><a href="main.html">Главная</a></li>
            <li><a href="catalog.html">Каталог</a></li>
            <li data-auth="out"><a href="login.html">Вход</a></li>
            <li data-auth="out"><a href="register.html">Регистрация</a></li>
            <li data-auth="in"><a href="profile.html">Профиль</a></li>
            <li data-auth="in"><a href="#" data-logout>Выйти</a></li>
        </ul>
    </nav>
</header>
<div class="auth-container">
    <div class="auth-card">
        <h2>Регистрация</h2>

        <form class="auth-form" data-auth-form="register" novalidate>
            <div class="field">
                <input id="register-name" name="name" type="text" placeholder="Имя" required autocomplete="name">
                <div id="register-name-error" class="field-error" aria-live="polite"></div>
            </div>

            <div class="field">
                <input id="register-email" name="email" type="email" placeholder="Email" required autocomplete="email">
                <div id="register-email-error" class="field-error" aria-live="polite"></div>
            </div>

            <div class="field">
                <input id="register-password" name="password" type="password" placeholder="Пароль" required autocomplete="new-password">
                <div id="register-password-error" class="field-error" aria-live="polite"></div>
            </div>

            <button class="auth-btn" type="submit">Зарегистрироваться</button>
            <div id="register-form-message" class="form-message" aria-live="polite"></div>
        </form>

        <p>Уже есть аккаунт? <a href="login.html">Войти</a></p>
    </div>
</div>

<script src="../js/auth-validation.js" defer></script>
<script src="../js/auth-api.js" defer></script>
<script src="../js/session.js" defer></script>
</body>
</html>
